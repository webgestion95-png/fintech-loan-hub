kind = "web"
previewPath = "/"
title = "LoanFlow"
version = "1.0.0"
id = "artifacts/loanflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19314

[services.development]
run = "pnpm --filter @workspace/loanflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loanflow", "run", "build" ]
publicDir = "artifacts/loanflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19314"
BASE_PATH = "/"
